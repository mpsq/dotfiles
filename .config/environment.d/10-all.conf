PATH=$HOME/.local/bin:$HOME/.config/emacs/bin:$HOME/.cargo/bin:$HOME/go/bin:$PATH

ELECTRON_OZONE_PLATFORM_HINT=auto
QT_QPA_PLATFORMTHEME=qt6ct
QS_ICON_THEME=Papirus
WLR_RENDERER=vulkan

XDG_CACHE_HOME=$HOME/.cache
XDG_CONFIG_HOME=$HOME/.config
XDG_SCREENSHOTS_DIR=$HOME/instants
XDG_DATA_HOME=$HOME/.local/share
XDG_STATE_HOME=$HOME/.local/state
XDG_CURRENT_DESKTOP=sway
XDG_DATA_DIRS=/usr/share/gnome:/usr/local/share:/usr/share:$HOME/.local/share
XDG_SESSION_TYPE=wayland
XDG_SESSION_CLASS=user

DOOMDIR=$XDG_CONFIG_HOME/doom-emacs
GNUPGHOME=$HOME/.gnupg
JAVA_HOME=/usr/lib/jvm/java-21-openjdk
NVM_DIR=$HOME/.nvm
GOPATH=$HOME/go
EDITOR="emacsclient -t"
VISUAL="emacsclient -c -a emacs"

BROWSER=firefox

SSH_AUTH_SOCK=$XDG_RUNTIME_DIR/gnupg/S.gpg-agent.ssh
