## mako config
## Automatically generated by Noctalia

# color

progress-color=over {{colors.primary.default.hex}}
text-color={{colors.on_surface.default.hex}}
background-color={{colors.surface_container.default.hex}}
border-color={{colors.outline.default.hex}}
padding=10

# ui

layer=overlay
border-radius=5
border-size=2
width=350
height=400
group-by=app-name,summary
max-icon-size=48
icon-path=/usr/share/icons/Papirus

# behaviour

default-timeout=5000
max-history=5
max-visible=8

[mode=do-not-disturb]
invisible=1

# format

format=%a\n<b>%s</b>\n%b
[grouped]
format=%a (%g)\n<b>%s</b>\n%b

# urgency

[urgency=low]
background-color={{colors.surface_container.default.hex}}
border-color={{colors.outline.default.hex}}
default-timeout=3500

[urgency=normal]
default-timeout=5000

[urgency=high]
border-color={{colors.error.default.hex}}
default-timeout=0

# per-app overrides

[app-name=notify-send]
history=0

[desktop-entry=Firefox summary~="New message from.*"]
on-notify=exec play-notification-sound direct-message
border-color={{colors.tertiary.default.hex}}
background-color={{colors.tertiary.default.hex}}
text-color={{colors.surface_container.default.hex}}
default-timeout=8000

[desktop-entry=firefox-developer-edition summary~="New message from.*"]
on-notify=exec play-notification-sound direct-message
border-color={{colors.tertiary.default.hex}}
background-color={{colors.tertiary.default.hex}}
text-color={{colors.surface_container.default.hex}}
default-timeout=8000

[desktop-entry=Firefox summary~="New message in.*"]
on-notify=exec play-notification-sound thread-message
text-color={{colors.tertiary.default.hex}}
default-timeout=8000

[desktop-entry=firefox-developer-edition summary~="New message in.*"]
on-notify=exec play-notification-sound thread-message
text-color={{colors.tertiary.default.hex}}
default-timeout=8000

